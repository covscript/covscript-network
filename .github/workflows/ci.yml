# CI for covscript-network extension.
#
# Matrix: 3 platforms x 2 covscript channels (release + nightly) = 6 jobs.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "${{ matrix.os }} / ${{ matrix.cs-channel }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        cs-channel: [release, nightly]

    steps:
      # ------------------------------------------------------------------ #
      # 1. Check out this extension repo                                    #
      # ------------------------------------------------------------------ #
      - name: Checkout extension
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Set platform identifiers                                         #
      # ------------------------------------------------------------------ #
      - name: Set platform identifiers
        id: platform
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   echo "os=ubuntu" >> "$GITHUB_OUTPUT"
                     echo "arch=x86_64" >> "$GITHUB_OUTPUT"
                     echo "cspkg_arch=amd64" >> "$GITHUB_OUTPUT" ;;
            macOS)   echo "os=macos" >> "$GITHUB_OUTPUT"
                     echo "arch=arm64" >> "$GITHUB_OUTPUT"
                     echo "cspkg_arch=arm64" >> "$GITHUB_OUTPUT" ;;
            Windows) echo "os=windows" >> "$GITHUB_OUTPUT"
                     echo "arch=x86_64" >> "$GITHUB_OUTPUT"
                     echo "cspkg_arch=amd64" >> "$GITHUB_OUTPUT" ;;
          esac

      # ------------------------------------------------------------------ #
      # 3. Determine csbuild release tag and asset suffix                   #
      # ------------------------------------------------------------------ #
      - name: Determine csbuild release
        id: cs-release
        shell: bash
        run: |
          if [ "${{ matrix.cs-channel }}" = "release" ]; then
            echo "tag=${{ steps.platform.outputs.os }}-schedule-release" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.platform.outputs.os }}-schedule" >> "$GITHUB_OUTPUT"
            echo "suffix=-nightly" >> "$GITHUB_OUTPUT"
          fi

      # ------------------------------------------------------------------ #
      # 4. Download and extract covscript SDK + cspkg repo                  #
      # ------------------------------------------------------------------ #
      - name: Download covscript SDK
        shell: bash
        run: |
          TAG="${{ steps.cs-release.outputs.tag }}"
          ARCH="${{ steps.platform.outputs.arch }}"
          OS="${{ steps.platform.outputs.os }}"
          SUFFIX="${{ steps.cs-release.outputs.suffix }}"
          BASE="https://github.com/covscript/csbuild/releases/download/${TAG}"

          COV="covscript-${OS}-${ARCH}${SUFFIX}.7z"
          PKG="cspkg-${OS}-${ARCH}${SUFFIX}.7z"

          echo "Downloading ${COV}..."
          curl -fsSL -o covscript.7z "${BASE}/${COV}"
          echo "Downloading ${PKG}..."
          curl -fsSL -o cspkg.7z "${BASE}/${PKG}"

          mkdir -p covscript
          7z x covscript.7z -ocovscript -y

          mkdir -p cspkg-repo
          7z x cspkg.7z -ocspkg-repo -y

          echo "=== covscript structure ==="
          find covscript -maxdepth 2 -type d 2>/dev/null || true
          echo "=== cspkg-repo structure ==="
          find cspkg-repo -maxdepth 2 -type d 2>/dev/null || true

      # ------------------------------------------------------------------ #
      # 5. Configure cspkg                                                  #
      # ------------------------------------------------------------------ #
      - name: Configure cspkg
        shell: bash
        run: |
          CSPKG_HOME="$HOME/.cspkg"
          if [ "${{ runner.os }}" = "Windows" ]; then
            CSPKG_HOME="$USERPROFILE/.cspkg"
          fi
          mkdir -p "$CSPKG_HOME"

          cat > "$CSPKG_HOME/config.json" << EOF
          {
            "arch": "${{ steps.platform.outputs.cspkg_arch }}",
            "home": "${{ github.workspace }}/covscript",
            "source": "file://${{ github.workspace }}/cspkg-repo/",
            "timeout_ms": "3000"
          }
          EOF

          echo "=== cspkg config ==="
          cat "$CSPKG_HOME/config.json"

      # ------------------------------------------------------------------ #
      # 6. Install local packages via cspkg                                 #
      # ------------------------------------------------------------------ #
      - name: Install packages via cspkg
        shell: bash
        run: |
          CSPKG="${{ github.workspace }}/covscript/bin/cspkg"
          if [ "${{ runner.os }}" = "Windows" ]; then
            CSPKG="${{ github.workspace }}/covscript/bin/cspkg.bat"
          fi
          "$CSPKG" -b . --install --yes

      # ------------------------------------------------------------------ #
      # 7. Add MinGW-w64 to PATH (Windows only)                            #
      # ------------------------------------------------------------------ #
      - name: Add MinGW to PATH
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/mingw64/bin" >> "$GITHUB_PATH"

      # ------------------------------------------------------------------ #
      # 8a. Build extension (Linux / macOS)                                #
      # ------------------------------------------------------------------ #
      - name: Build extension
        if: runner.os != 'Windows'
        shell: bash
        env:
          CS_DEV_PATH: ${{ github.workspace }}/covscript/csdev
        run: |
          cmake -G "Unix Makefiles" -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel 4
          mkdir -p build/imports
          cp build/*.cse build/imports/

      # ------------------------------------------------------------------ #
      # 8b. Build extension (Windows / MinGW)                              #
      # ------------------------------------------------------------------ #
      - name: Build extension (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          set CS_DEV_PATH=${{ github.workspace }}\covscript\csdev
          if not exist build mkdir build
          cd build
          cmake -G "MinGW Makefiles" .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --parallel 4
          cd ..
          if not exist build\imports mkdir build\imports
          copy build\*.cse build\imports\

      # ------------------------------------------------------------------ #
      # 9. Debug info                                                     #
      # ------------------------------------------------------------------ #
      - name: Debug info
        shell: bash
        run: |
          CS="${{ github.workspace }}/covscript/bin/cs"
          if [ "${{ runner.os }}" = "Windows" ]; then
            CS="${{ github.workspace }}/covscript/bin/cs.exe"
          fi
          echo "=== covscript version ==="
          "$CS" --version
          echo "=== covscript imports ==="
          ls -la "${{ github.workspace }}/covscript/imports/" 2>/dev/null || echo "(not found)"

      # ------------------------------------------------------------------ #
      # 10a. Run unit tests (Linux / macOS)                                #
      # ------------------------------------------------------------------ #
      - name: Run unit tests
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          CS="${{ github.workspace }}/covscript/bin/cs"
          export PATH="${{ github.workspace }}/covscript/bin:$PATH"
          "$CS" tests/test_url_parse.csc
          "$CS" tests/test_header_parser.csc
          "$CS" tests/test_openai_client.csc

      # ------------------------------------------------------------------ #
      # 10b. Run unit tests (Windows)                                      #
      # ------------------------------------------------------------------ #
      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cs = "${{ github.workspace }}\covscript\bin\cs.exe"
          $env:Path = "${{ github.workspace }}\covscript\bin;$env:Path"
          & $cs tests\test_url_parse.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $cs tests\test_header_parser.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $cs tests\test_openai_client.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ------------------------------------------------------------------ #
      # 11a. Run async TCP test (Linux / macOS)                            #
      # ------------------------------------------------------------------ #
      - name: Run async TCP test
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          CS="${{ github.workspace }}/covscript/bin/cs"
          export PATH="${{ github.workspace }}/covscript/bin:$PATH"
          "$CS" tests/test_async_tcp.csc

      # ------------------------------------------------------------------ #
      # 11b. Run async TCP test (Windows)                                  #
      # ------------------------------------------------------------------ #
      - name: Run async TCP test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cs = "${{ github.workspace }}\covscript\bin\cs.exe"
          $env:Path = "${{ github.workspace }}\covscript\bin;$env:Path"
          & $cs tests\test_async_tcp.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ------------------------------------------------------------------ #
      # 12a. Run integration tests (Linux / macOS)                         #
      # ------------------------------------------------------------------ #
      - name: Run integration tests
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          CS="${{ github.workspace }}/covscript/bin/cs"
          export PATH="${{ github.workspace }}/covscript/bin:$PATH"
          "$CS" tests/test_tls_trust.csc

      # ------------------------------------------------------------------ #
      # 12b. Run integration tests (Windows)                               #
      # ------------------------------------------------------------------ #
      - name: Run integration tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $cs = "${{ github.workspace }}\covscript\bin\cs.exe"
          $env:Path = "${{ github.workspace }}\covscript\bin;$env:Path"
          & $cs tests\test_tls_trust.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ------------------------------------------------------------------ #
      # 13a. Run DeepSeek test (only when API key is available)            #
      # ------------------------------------------------------------------ #
      - name: Run DeepSeek test
        if: runner.os != 'Windows' && github.secrets.DEEPSEEK_API_KEY != ''
        shell: bash
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -e
          CS="${{ github.workspace }}/covscript/bin/cs"
          export PATH="${{ github.workspace }}/covscript/bin:$PATH"
          "$CS" tests/test_deepseek.csc

      # ------------------------------------------------------------------ #
      # 13b. Run DeepSeek test (Windows, only when API key is available)   #
      # ------------------------------------------------------------------ #
      - name: Run DeepSeek test (Windows)
        if: runner.os == 'Windows' && github.secrets.DEEPSEEK_API_KEY != ''
        shell: pwsh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          $cs = "${{ github.workspace }}\covscript\bin\cs.exe"
          $env:Path = "${{ github.workspace }}\covscript\bin;$env:Path"
          & $cs tests\test_deepseek.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
