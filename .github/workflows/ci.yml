# CI for covscript-network extension.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "${{ matrix.os }} / ${{ matrix.cs-channel }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2022]
        cs-channel: [release, nightly]

    steps:
      # ------------------------------------------------------------------ #
      # 1. Check out this extension repo                                    #
      # ------------------------------------------------------------------ #
      - name: Checkout extension
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Set platform identifiers                                         #
      # ------------------------------------------------------------------ #
      - name: Set platform identifiers
        id: platform
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   echo "os=ubuntu" >> "$GITHUB_OUTPUT"
                     echo "arch=x86_64" >> "$GITHUB_OUTPUT"
                     echo "cspkg_arch=amd64" >> "$GITHUB_OUTPUT"
                     echo "cspkg_arch_dir=ubuntu/x86_64" >> "$GITHUB_OUTPUT" ;;
            macOS)   echo "os=macos" >> "$GITHUB_OUTPUT"
                     echo "arch=arm64" >> "$GITHUB_OUTPUT"
                     echo "cspkg_arch=arm64" >> "$GITHUB_OUTPUT"
                     echo "cspkg_arch_dir=darwin/arm64" >> "$GITHUB_OUTPUT" ;;
            Windows) echo "os=windows" >> "$GITHUB_OUTPUT"
                     echo "arch=x86_64" >> "$GITHUB_OUTPUT"
                     echo "cspkg_arch=amd64" >> "$GITHUB_OUTPUT"
                     echo "cspkg_arch_dir=windows-ucrt/amd64" >> "$GITHUB_OUTPUT" ;;
          esac

      # ------------------------------------------------------------------ #
      # 3. Determine release tag                                            #
      # ------------------------------------------------------------------ #
      - name: Determine csbuild release
        id: cs-release
        shell: bash
        run: |
          if [ "${{ matrix.cs-channel }}" = "release" ]; then
            echo "tag=${{ steps.platform.outputs.os }}-schedule-release" >> "$GITHUB_OUTPUT"
            echo "suffix=" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ steps.platform.outputs.os }}-schedule" >> "$GITHUB_OUTPUT"
            echo "suffix=-nightly" >> "$GITHUB_OUTPUT"
          fi

      # ------------------------------------------------------------------ #
      # 4. Download & extract covscript SDK + cspkg repo                    #
      # ------------------------------------------------------------------ #
      - name: Download covscript SDK
        shell: bash
        run: |
          TAG="${{ steps.cs-release.outputs.tag }}"
          ARCH="${{ steps.platform.outputs.arch }}"
          OS="${{ steps.platform.outputs.os }}"
          SUFFIX="${{ steps.cs-release.outputs.suffix }}"
          BASE="https://github.com/covscript/csbuild/releases/download/${TAG}"
          COV="covscript-${OS}-${ARCH}${SUFFIX}.7z"
          PKG="cspkg-${OS}-${ARCH}${SUFFIX}.7z"

          echo "Downloading ${COV}..."
          curl -fsSL -o covscript.7z "${BASE}/${COV}"
          echo "Downloading ${PKG}..."
          curl -fsSL -o cspkg.7z "${BASE}/${PKG}"

          7z x covscript.7z -y
          mv build covscript-home
          7z x cspkg.7z -y

          echo "=== covscript-home ==="
          ls -la covscript-home/
          echo "=== covscript-home/bin ==="
          ls -la covscript-home/bin/
          echo "=== cspkg-repo ==="
          ls -la cspkg-repo/

      # ------------------------------------------------------------------ #
      # 6. Configure and run cspkg                                          #
      # ------------------------------------------------------------------ #
      - name: Configure cspkg
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            CSPKG_CONF="$USERPROFILE/.cspkg"
          else
            CSPKG_CONF="$HOME/.cspkg"
          fi
          mkdir -p "$CSPKG_CONF"

          cat > "$CSPKG_CONF/config.json" << EOF
          {
            "arch": "${{ steps.platform.outputs.cspkg_arch }}",
            "home": "${{ github.workspace }}/covscript-home",
            "source": "file://${{ github.workspace }}/cspkg-repo/",
            "timeout_ms": "3000"
          }
          EOF

          echo "=== cspkg config ==="
          cat "$CSPKG_CONF/config.json"

      # ------------------------------------------------------------------ #
      # 7. Run cspkg install --import                                        #
      # ------------------------------------------------------------------ #
      - name: Run cspkg install
        shell: bash
        run: |
          export COVSCRIPT_HOME="${{ github.workspace }}/covscript-home"
          export PATH="$COVSCRIPT_HOME/bin:$PATH"

          # Ensure all executables are runnable
          chmod -R +x "$COVSCRIPT_HOME/bin/"
          cspkg install --import
          cspkg version
          cspkg list

      # ------------------------------------------------------------------ #
      # 8. Add MinGW-w64 to PATH (Windows only)                            #
      # ------------------------------------------------------------------ #
      - name: Add MinGW to PATH
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/mingw64/bin" >> "$GITHUB_PATH"

      # ------------------------------------------------------------------ #
      # 9a. Build extension (Linux / macOS)                                #
      # ------------------------------------------------------------------ #
      - name: Build extension
        if: runner.os != 'Windows'
        shell: bash
        env:
          CS_DEV_PATH: ${{ github.workspace }}/covscript-home/csdev
        run: |
          csbuild/make.sh

      # ------------------------------------------------------------------ #
      # 9b. Build extension (Windows / MinGW)                              #
      # ------------------------------------------------------------------ #
      - name: Build extension (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          set CS_DEV_PATH=${{ github.workspace }}\covscript-home\csdev
          csbuild\make.bat

      # ------------------------------------------------------------------ #
      # 10. Install built extension + packages                              #
      # ------------------------------------------------------------------ #
      - name: Install local build
        shell: bash
        run: |
          export COVSCRIPT_HOME="${{ github.workspace }}/covscript-home"
          export PATH="$COVSCRIPT_HOME/bin:$PATH"
          cspkg build . --install
          cspkg list

      # ------------------------------------------------------------------ #
      # 11a. Run unit tests (Linux / macOS)                                #
      # ------------------------------------------------------------------ #
      - name: Run unit tests
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          export COVSCRIPT_HOME="${{ github.workspace }}/covscript-home"
          export PATH="$COVSCRIPT_HOME/bin:$PATH"
          cs tests/test_url_parse.csc
          cs tests/test_header_parser.csc
          cs tests/test_openai_client.csc

      # ------------------------------------------------------------------ #
      # 11b. Run unit tests (Windows)                                      #
      # ------------------------------------------------------------------ #
      - name: Run unit tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:COVSCRIPT_HOME = "${{ github.workspace }}\covscript-home"
          $env:Path = "${{ github.workspace }}\covscript-home\bin;$env:Path"
          $cs = "${{ github.workspace }}\covscript-home\bin\cs.exe"
          & $cs tests\test_url_parse.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $cs tests\test_header_parser.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $cs tests\test_openai_client.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ------------------------------------------------------------------ #
      # 12a. Run async TCP test (Linux / macOS)                            #
      # ------------------------------------------------------------------ #
      - name: Run async TCP test
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          export COVSCRIPT_HOME="${{ github.workspace }}/covscript-home"
          export PATH="$COVSCRIPT_HOME/bin:$PATH"
          cs tests/test_async_tcp.csc

      # ------------------------------------------------------------------ #
      # 12b. Run async TCP test (Windows)                                  #
      # ------------------------------------------------------------------ #
      - name: Run async TCP test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:COVSCRIPT_HOME = "${{ github.workspace }}\covscript-home"
          $env:Path = "${{ github.workspace }}\covscript-home\bin;$env:Path"
          & "${{ github.workspace }}\covscript-home\bin\cs.exe" tests\test_async_tcp.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ------------------------------------------------------------------ #
      # 13a. Run integration tests (Linux / macOS)                         #
      # ------------------------------------------------------------------ #
      - name: Run integration tests
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          export COVSCRIPT_HOME="${{ github.workspace }}/covscript-home"
          export PATH="$COVSCRIPT_HOME/bin:$PATH"
          cs tests/test_tls_trust.csc

      # ------------------------------------------------------------------ #
      # 13b. Run integration tests (Windows)                               #
      # ------------------------------------------------------------------ #
      - name: Run integration tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:COVSCRIPT_HOME = "${{ github.workspace }}\covscript-home"
          $env:Path = "${{ github.workspace }}\covscript-home\bin;$env:Path"
          & "${{ github.workspace }}\covscript-home\bin\cs.exe" tests\test_tls_trust.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ------------------------------------------------------------------ #
      # 14a. Run DeepSeek test (only when API key is available)            #
      # ------------------------------------------------------------------ #
      - name: Run DeepSeek test
        if: runner.os != 'Windows' && github.secrets.DEEPSEEK_API_KEY != ''
        shell: bash
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -e
          export COVSCRIPT_HOME="${{ github.workspace }}/covscript-home"
          export PATH="$COVSCRIPT_HOME/bin:$PATH"
          cs tests/test_deepseek.csc

      # ------------------------------------------------------------------ #
      # 14b. Run DeepSeek test (Windows, only when API key is available)   #
      # ------------------------------------------------------------------ #
      - name: Run DeepSeek test (Windows)
        if: runner.os == 'Windows' && github.secrets.DEEPSEEK_API_KEY != ''
        shell: pwsh
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          $env:COVSCRIPT_HOME = "${{ github.workspace }}\covscript-home"
          $env:Path = "${{ github.workspace }}\covscript-home\bin;$env:Path"
          & "${{ github.workspace }}\covscript-home\bin\cs.exe" tests\test_deepseek.csc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
